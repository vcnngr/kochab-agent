name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.26"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go test -race -cover ./...

  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, test]
    outputs:
      version: ${{ steps.extract-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Extract version from tag
        id: extract-version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building release for version: $VERSION"

      - name: Install dpkg-deb
        run: sudo apt-get update && sudo apt-get install -y dpkg

      - name: Build release artifacts (cross-compile + .deb)
        run: make release VERSION=${{ steps.extract-version.outputs.version }}

      - name: List artifacts
        run: ls -lh bin/

      - name: Verify checksums local
        run: |
          cd bin
          sha256sum -c kochab-agent.sha256
          sha256sum -c kochab-agent-arm64.sha256
          sha256sum -c kochab-agent_${{ steps.extract-version.outputs.version }}_amd64.deb.sha256

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/kochab-agent
            bin/kochab-agent.sha256
            bin/kochab-agent-arm64
            bin/kochab-agent-arm64.sha256
            bin/kochab-agent_${{ steps.extract-version.outputs.version }}_amd64.deb
            bin/kochab-agent_${{ steps.extract-version.outputs.version }}_amd64.deb.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true

  docker-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-and-release]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            vcnngr/kochab-agent:${{ needs.build-and-release.outputs.version }}
            vcnngr/kochab-agent:latest
          build-args: |
            VERSION=${{ needs.build-and-release.outputs.version }}
